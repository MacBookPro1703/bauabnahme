<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>BauAbnahme · Ebbing Project</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --haupt:#2D2F6B;
  --akzent:#C9A882;
  --hell:#EEEEF6;
  --bg:#F1F5F9;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;background:var(--bg);min-height:100vh;color:#1E293B;-webkit-tap-highlight-color:transparent;}

/* HEADER */
#header{background:var(--haupt);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.hlogo{width:34px;height:34px;background:var(--akzent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:20px;color:var(--haupt);flex-shrink:0;}
.hname{font-weight:800;font-size:14px;letter-spacing:.5px;}
.hsub{font-size:10px;color:rgba(255,255,255,.6);margin-top:1px;}
#btn-back{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:8px;width:36px;height:36px;font-size:18px;cursor:pointer;display:none;align-items:center;justify-content:center;-webkit-appearance:none;}
#hbtn-weiter{background:var(--akzent);border:none;color:var(--haupt);border-radius:10px;padding:9px 16px;font-weight:800;font-size:13px;cursor:pointer;display:none;-webkit-appearance:none;font-family:inherit;}

/* PROGRESS */
#prog-outer{height:4px;background:rgba(255,255,255,.2);display:none;}
#prog-inner{height:100%;width:0;background:var(--akzent);transition:width .4s;}

/* MAIN */
#app{max-width:700px;margin:0 auto;padding:18px 14px 60px;}
.screen{display:none;}
.screen.active{display:block;}

/* START */
.hero{text-align:center;padding:24px 0 28px;}
.hero-logo{width:68px;height:68px;background:var(--haupt);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;box-shadow:0 6px 24px rgba(45,47,107,.35);}
.hero-logo span{font-size:38px;font-weight:900;color:var(--akzent);}
.hero-brand{font-weight:800;font-size:11px;letter-spacing:3px;color:var(--akzent);margin-bottom:6px;}
.hero h1{font-size:24px;font-weight:800;letter-spacing:-1px;color:var(--haupt);margin-bottom:6px;}
.hero p{color:#64748B;font-size:14px;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:4px;}
.gcard{display:block;background:#fff;border:2px solid rgba(45,47,107,.12);border-radius:16px;padding:20px 16px;cursor:pointer;text-align:left;font-family:inherit;width:100%;-webkit-tap-highlight-color:rgba(45,47,107,.08);}
.gcard:active{opacity:.75;transform:scale(.97);}
.gcard .gi{font-size:28px;display:block;margin-bottom:8px;}
.gcard .gn{font-weight:700;font-size:14px;color:var(--haupt);}
.gcard .gc{font-size:12px;color:#94A3B8;margin-top:3px;}
.hero-addr{text-align:center;margin-top:24px;font-size:11px;color:#94A3B8;}

/* CARD */
.card{background:#fff;border:1.5px solid #E2E8F0;border-radius:14px;padding:16px;margin-bottom:14px;}
.card-title{font-weight:700;font-size:14px;margin-bottom:12px;color:var(--haupt);}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.mfield label{font-size:11px;font-weight:600;color:#64748B;display:block;margin-bottom:4px;text-transform:uppercase;}
.mfield input{width:100%;border:1.5px solid #E2E8F0;border-radius:8px;padding:9px 10px;font-size:14px;font-family:inherit;outline:none;color:#1E293B;background:#fff;}
.mfield input:focus{border-color:var(--haupt);}
.slabel{font-weight:700;font-size:14px;margin-bottom:10px;display:flex;align-items:center;gap:8px;color:var(--haupt);}
.badge{border-radius:6px;padding:2px 9px;font-size:12px;font-weight:700;background:rgba(201,168,130,.25);color:var(--haupt);}

/* PRÜF ITEM */
.pitem{background:#fff;border:1.5px solid #E2E8F0;border-radius:12px;padding:14px;margin-bottom:10px;}
.phead{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.pnum{border-radius:6px;padding:3px 9px;font-size:12px;font-weight:700;flex-shrink:0;background:rgba(201,168,130,.25);color:var(--haupt);}
.ptitel{flex:1;border:none;outline:none;font-size:14px;font-weight:600;font-family:inherit;color:var(--haupt);background:transparent;min-width:0;}
.pdel{background:none;border:none;color:#CBD5E1;font-size:22px;cursor:pointer;padding:0;flex-shrink:0;line-height:1;-webkit-tap-highlight-color:transparent;}

.brow{display:flex;gap:6px;margin-bottom:10px;}
.bbtn{flex:1;padding:9px 4px;border-radius:8px;border:2px solid #E2E8F0;background:#fff;font-weight:700;font-size:13px;font-family:inherit;color:#9CA3AF;cursor:pointer;-webkit-appearance:none;-webkit-tap-highlight-color:transparent;}
.bbtn.io{border-color:#6EE7B7!important;background:#ECFDF5!important;color:#10B981!important;}
.bbtn.mangel{border-color:#FCA5A5!important;background:#FEF2F2!important;color:#EF4444!important;}
.bbtn.na{border-color:#D1D5DB!important;background:#F9FAFB!important;color:#6B7280!important;}

/* BEMERKUNG MIT DIKTAT */
.bemwrap{margin-bottom:10px;}
.bemwrap textarea{width:100%;border:1.5px solid #E2E8F0;border-radius:8px;padding:8px 10px;font-size:13px;resize:vertical;font-family:inherit;color:#374151;outline:none;min-height:60px;background:#fff;display:block;}
.diktat-row{display:flex;gap:6px;margin-top:6px;}
.diktat-btn{flex:1;padding:9px;background:var(--haupt);color:#fff;border:none;border-radius:8px;font-size:13px;font-family:inherit;cursor:pointer;-webkit-appearance:none;-webkit-tap-highlight-color:transparent;font-weight:600;}
.diktat-btn.on{background:#EF4444;}
.diktat-input{flex:1;border:1.5px solid var(--akzent);border-radius:8px;padding:9px 10px;font-size:13px;font-family:inherit;color:#374151;outline:none;background:#FFF8EE;}

.foto-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;}
.fthumb{position:relative;width:74px;height:74px;}
.fthumb img{width:74px;height:74px;object-fit:cover;border-radius:8px;border:2px solid #E2E8F0;}
.fdel{position:absolute;top:-7px;right:-7px;background:#EF4444;color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.fadd{background:#F8FAFC;border:1.5px dashed var(--akzent);border-radius:8px;padding:8px 14px;font-size:13px;color:var(--haupt);font-family:inherit;cursor:pointer;font-weight:600;-webkit-appearance:none;-webkit-tap-highlight-color:transparent;}

.addpos{width:100%;padding:13px;background:#fff;border:2px dashed var(--akzent);border-radius:12px;font-weight:700;font-size:14px;font-family:inherit;color:var(--haupt);cursor:pointer;margin-top:4px;-webkit-appearance:none;-webkit-tap-highlight-color:transparent;}
.wbtn{width:100%;padding:15px;border:none;border-radius:12px;color:#fff;font-weight:800;font-size:15px;font-family:inherit;background:var(--haupt);margin-top:14px;cursor:pointer;-webkit-appearance:none;-webkit-tap-highlight-color:transparent;}

/* VORSCHAU */
.vhint{background:#fff;border:1.5px solid rgba(45,47,107,.15);border-radius:14px;padding:14px;margin-bottom:12px;display:flex;align-items:center;gap:12px;}
.arow{display:flex;gap:10px;margin-bottom:14px;}
.abtn{flex:1;padding:13px;border-radius:12px;border:none;font-weight:700;font-size:14px;font-family:inherit;cursor:pointer;-webkit-appearance:none;-webkit-tap-highlight-color:transparent;}
.paper{background:#fff;border:1.5px solid rgba(45,47,107,.15);border-radius:14px;padding:26px 20px;font-family:Georgia,serif;font-size:13px;line-height:1.55;}

@media print{
  #header,#prog-outer,.no-print{display:none!important;}
  body{background:#fff;}
  #app{padding:0;max-width:100%;}
  #screen-start,#screen-protokoll{display:none!important;}
  #screen-vorschau{display:block!important;}
  .vhint,.arow{display:none!important;}
  .paper{border:none;border-radius:0;padding:0;}
}
</style>
</head>
<body>

<div id="header">
  <div style="display:flex;align-items:center;gap:10px;">
    <button id="btn-back" onclick="zurueck()">←</button>
    <div class="hlogo">E</div>
    <div>
      <div class="hname">EBBING <span style="font-weight:400;opacity:.8;">PROJECT</span></div>
      <div class="hsub" id="hsub">VOB/B § 12 Protokoll</div>
    </div>
  </div>
  <button id="hbtn-weiter" onclick="zuVorschau()">Vorschau →</button>
</div>
<div id="prog-outer"><div id="prog-inner"></div></div>

<div id="app">

  <!-- START -->
  <div id="screen-start" class="screen active">
    <div class="hero">
      <div class="hero-logo"><span>E</span></div>
      <div class="hero-brand">EBBING PROJECT</div>
      <h1>Neues Abnahmeprotokoll</h1>
      <p>Gewerk auswählen und loslegen</p>
    </div>
    <div class="grid">
      <button class="gcard" id="g-elektro"><span class="gi">⚡</span><div class="gn">Elektroinstallation</div><div class="gc">8 Punkte</div></button>
      <button class="gcard" id="g-sanitaer"><span class="gi">🔧</span><div class="gn">Sanitär / Heizung</div><div class="gc">8 Punkte</div></button>
      <button class="gcard" id="g-trockenbau"><span class="gi">🏗️</span><div class="gn">Trockenbau / Maler</div><div class="gc">8 Punkte</div></button>
      <button class="gcard" id="g-freitext"><span class="gi">📋</span><div class="gn">Freitext / Sonstiges</div><div class="gc">Eigene Punkte</div></button>
    </div>
    <div class="hero-addr">Marienthaler Str. 44A · D-46348 Raesfeld · info@ebbing-project.de</div>
  </div>

  <!-- PROTOKOLL -->
  <div id="screen-protokoll" class="screen">
    <div class="card">
      <div class="card-title">📁 Projektdaten</div>
      <div class="mgrid">
        <div class="mfield"><label>Projektname</label><input id="f-projekt" placeholder="z. B. Fitomat Ommersheim"/></div>
        <div class="mfield"><label>Auftragnehmer</label><input id="f-an" placeholder="Firma + Person"/></div>
        <div class="mfield"><label>Abnahmedatum</label><input id="f-datum" type="date"/></div>
        <div class="mfield"><label>Anwesende</label><input id="f-anwesende" placeholder="Name, Funktion"/></div>
      </div>
    </div>
    <div class="slabel">Prüfpositionen <span class="badge" id="pos-badge">0</span></div>
    <div id="pruef-liste"></div>
    <button class="addpos" id="btn-addpos">+ Prüfpunkt hinzufügen</button>
    <button class="wbtn" id="btn-weiter-main">Protokoll erstellen →</button>
  </div>

  <!-- VORSCHAU -->
  <div id="screen-vorschau" class="screen">
    <div class="vhint no-print">
      <span style="font-size:22px;">✅</span>
      <div><div style="font-weight:700;font-size:14px;color:var(--haupt);">Protokoll bereit</div><div style="font-size:12px;color:#64748B;">Drucken → Als PDF sichern</div></div>
    </div>
    <div class="arow no-print">
      <button class="abtn" id="btn-print" style="background:var(--haupt);color:#fff;">🖨 Drucken / PDF</button>
      <button class="abtn" id="btn-neu" style="background:#E2E8F0;color:#1E293B;">＋ Neu</button>
    </div>
    <div class="paper" id="pdf-ausgabe"></div>
  </div>

</div>

<script>
var GW={
  elektro:   {l:"Elektroinstallation",i:"⚡",p:["Vollständigkeit der Installation lt. Leistungsverzeichnis","Funktionsprüfung aller Schaltkreise","Sicherungskasten / Beschriftung korrekt","Steckdosen / Schalter optisch i.O.","Isolationsmessprotokoll vorhanden (DIN VDE 0100-600)","Konformitätserklärung übergeben","Kabelführung fachgerecht ausgeführt","Erdung / Potentialausgleich geprüft"]},
  sanitaer:  {l:"Sanitär / Heizung",i:"🔧",p:["Dichtheitsprüfung Wasserleitungen","Drucktest durchgeführt und dokumentiert","Armaturen vollständig und funktionsfähig","Entwässerung geprüft (Gefälle / Geruchsverschluss)","Heizungsanlage befüllt und entlüftet","Thermostate / Regelung funktionsfähig","Abnahmeprotokoll Schornsteinfeger vorhanden","Wartungsunterlagen übergeben"]},
  trockenbau:{l:"Trockenbau / Maler",i:"🏗️",p:["Wandflächen eben und ohne Risse","Anschlüsse / Fugen sauber ausgeführt","Ecken und Kanten scharf und gerade","Farbton entspricht Vereinbarung","Deckenhöhe lt. Plan eingehalten","Schallschutz / Brandschutz nachgewiesen","Abgehängte Decken geprüft (Befestigung)","Endreinigung durchgeführt"]},
  freitext:  {l:"Freitext / Sonstiges",i:"📋",p:[]}
};
var BF={io:{l:"i.O.",f:"#10B981",bg:"#ECFDF5",b:"#6EE7B7"},mangel:{l:"Mangel",f:"#EF4444",bg:"#FEF2F2",b:"#FCA5A5"},na:{l:"n.a.",f:"#6B7280",bg:"#F9FAFB",b:"#D1D5DB"}};
var aktG=null,pos=[],spRec=null,spIdx=-1;

function pad(n){return n<10?"0"+n:String(n);}
window.onload=function(){var d=new Date();document.getElementById("f-datum").value=d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());};

// Touch+Click für alle fixen Buttons
function bind(id,fn){
  var el=document.getElementById(id);if(!el)return;
  el.addEventListener("click",function(e){e.preventDefault();fn();},false);
  el.addEventListener("touchend",function(e){e.preventDefault();fn();},false);
}
bind("g-elektro",   function(){gewerkWaehlen("elektro");});
bind("g-sanitaer",  function(){gewerkWaehlen("sanitaer");});
bind("g-trockenbau",function(){gewerkWaehlen("trockenbau");});
bind("g-freitext",  function(){gewerkWaehlen("freitext");});
bind("btn-addpos",  function(){posHinzu();});
bind("btn-weiter-main",function(){zuVorschau();});
bind("hbtn-weiter", function(){zuVorschau();});
bind("btn-back",    function(){zurueck();});
bind("btn-print",   function(){window.print();});
bind("btn-neu",     function(){neuesProtokoll();});

function zeige(id){document.querySelectorAll(".screen").forEach(function(s){s.classList.remove("active");});document.getElementById("screen-"+id).classList.add("active");window.scrollTo(0,0);}

function gewerkWaehlen(key){
  aktG=key;
  var g=GW[key];
  pos=g.p.map(function(t){return{t:t,b:null,m:"",f:[]};});
  if(key==="freitext")pos.push({t:"",b:null,m:"",f:[]});
  document.getElementById("hsub").textContent="0 / "+pos.length+" geprüft";
  document.getElementById("btn-back").style.display="flex";
  document.getElementById("hbtn-weiter").style.display="inline-flex";
  document.getElementById("prog-outer").style.display="block";
  renderListe();zeige("protokoll");
}

function zurueck(){
  var aktiv=document.querySelector(".screen.active").id;
  if(aktiv==="screen-vorschau"){document.getElementById("btn-print").style.display="flex";zeige("protokoll");}
  else{document.getElementById("btn-back").style.display="none";document.getElementById("hbtn-weiter").style.display="none";document.getElementById("prog-outer").style.display="none";document.getElementById("hsub").textContent="VOB/B § 12 Protokoll";zeige("start");}
}

function neuesProtokoll(){
  aktG=null;pos=[];
  ["f-projekt","f-an","f-anwesende"].forEach(function(id){document.getElementById(id).value="";});
  document.getElementById("btn-back").style.display="none";
  document.getElementById("hbtn-weiter").style.display="none";
  document.getElementById("btn-print").style.display="none";
  document.getElementById("prog-outer").style.display="none";
  document.getElementById("hsub").textContent="VOB/B § 12 Protokoll";
  zeige("start");
}

function renderListe(){
  var liste=document.getElementById("pruef-liste");
  liste.innerHTML="";
  for(var i=0;i<pos.length;i++)liste.appendChild(bauItem(i));
  updateProg();
}

function bauItem(idx){
  var p=pos[idx];
  var div=document.createElement("div");div.className="pitem";div.id="item-"+idx;

  // Kopf
  var head=document.createElement("div");head.className="phead";
  var num=document.createElement("span");num.className="pnum";num.textContent=pad(idx+1);
  var ti=document.createElement("input");ti.className="ptitel";ti.value=p.t;ti.placeholder="Prüfpunkt...";
  ti.oninput=(function(i){return function(){pos[i].t=this.value;};})(idx);
  var del=document.createElement("button");del.className="pdel";del.textContent="×";
  (function(i){
    del.addEventListener("click",function(e){e.preventDefault();pos.splice(i,1);renderListe();},false);
    del.addEventListener("touchend",function(e){e.preventDefault();pos.splice(i,1);renderListe();},false);
  })(idx);
  head.appendChild(num);head.appendChild(ti);head.appendChild(del);

  // Bewertung
  var brow=document.createElement("div");brow.className="brow";
  [{v:"io",l:"i.O."},{v:"mangel",l:"Mangel"},{v:"na",l:"n.a."}].forEach(function(bv){
    var btn=document.createElement("button");
    btn.className="bbtn"+(p.b===bv.v?" "+bv.v:"");
    btn.textContent=bv.l;
    (function(v){
      btn.addEventListener("click",function(e){e.preventDefault();pos[idx].b=v;renderItem(idx);updateProg();},false);
      btn.addEventListener("touchend",function(e){e.preventDefault();pos[idx].b=v;renderItem(idx);updateProg();},false);
    })(bv.v);
    brow.appendChild(btn);
  });

  // Bemerkung + Diktat (iOS native)
  var bemwrap=document.createElement("div");bemwrap.className="bemwrap";
  var ta=document.createElement("textarea");ta.placeholder="Bemerkung hier eingeben...";ta.value=p.m;
  ta.oninput=(function(i){return function(){pos[i].m=this.value;};})(idx);

  // Diktat-Zeile: Button öffnet natives iOS Spracheingabe-Feld
  var diktatRow=document.createElement("div");diktatRow.className="diktat-row";

  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(SR){
    // Web Speech API verfügbar
    var spkBtn=document.createElement("button");
    spkBtn.className="diktat-btn"+(spIdx===idx?" on":"");
    spkBtn.textContent=spIdx===idx?"⏹ Stopp":"🎤 Sprechen";
    (function(i){
      function doSpeak(e){e.preventDefault();toggleSprache(i);}
      spkBtn.addEventListener("click",doSpeak,false);
      spkBtn.addEventListener("touchend",doSpeak,false);
    })(idx);
    diktatRow.appendChild(spkBtn);
  } else {
    // Fallback: natives iOS Diktat über Input-Feld
    var diktatInp=document.createElement("input");
    diktatInp.className="diktat-input";
    diktatInp.placeholder="🎤 Hier tippen → iOS Diktat nutzen";
    diktatInp.setAttribute("enterkeyhint","done");
    diktatInp.oninput=(function(i,t){return function(){
      if(this.value){
        pos[i].m=pos[i].m?pos[i].m+" "+this.value:this.value;
        t.value=pos[i].m;
        this.value="";
      }
    };})(idx,ta);
    diktatRow.appendChild(diktatInp);
  }

  bemwrap.appendChild(ta);
  bemwrap.appendChild(diktatRow);

  // Fotos
  var fw=document.createElement("div");
  if(p.f&&p.f.length){
    var fg=document.createElement("div");fg.className="foto-grid";
    p.f.forEach(function(src,fi){
      (function(fi2){
        var th=document.createElement("div");th.className="fthumb";
        var img=document.createElement("img");img.src=src;
        var fd=document.createElement("button");fd.className="fdel";fd.textContent="×";
        function doDelFoto(e){e.preventDefault();pos[idx].f.splice(fi2,1);renderItem(idx);}
        fd.addEventListener("click",doDelFoto,false);fd.addEventListener("touchend",doDelFoto,false);
        th.appendChild(img);th.appendChild(fd);fg.appendChild(th);
      })(fi);
    });
    fw.appendChild(fg);
  }
  var finput=document.createElement("input");
  finput.type="file";finput.accept="image/*";finput.multiple=true;finput.capture="environment";finput.style.display="none";
  finput.onchange=(function(i){return function(){
    var files=Array.from(this.files);
    files.forEach(function(file){var r=new FileReader();r.onload=function(ev){pos[i].f.push(ev.target.result);renderItem(i);};r.readAsDataURL(file);});
  };})(idx);
  var fadd=document.createElement("button");fadd.className="fadd";fadd.textContent="📷 Foto";
  (function(i){
    function doFoto(e){e.preventDefault();document.querySelector("#item-"+i+" input[type=file]").click();}
    fadd.addEventListener("click",doFoto,false);fadd.addEventListener("touchend",doFoto,false);
  })(idx);
  fw.appendChild(finput);fw.appendChild(fadd);

  div.appendChild(head);div.appendChild(brow);div.appendChild(bemwrap);div.appendChild(fw);
  return div;
}

function renderItem(idx){var alt=document.getElementById("item-"+idx);if(alt)alt.parentNode.replaceChild(bauItem(idx),alt);}

function toggleSprache(idx){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert("Spracherkennung wird auf diesem Gerät nicht unterstützt.");return;}
  // Läuft gerade -> stoppen
  if(spRec&&spIdx===idx){
    try{spRec.stop();}catch(e){}
    spRec=null;spIdx=-1;renderItem(idx);return;
  }
  // Neu starten
  if(spRec){try{spRec.stop();}catch(e){}spRec=null;}
  spIdx=idx;renderItem(idx);
  var rec=new SR();
  rec.lang="de-DE";
  rec.continuous=false;
  rec.interimResults=false;
  rec.maxAlternatives=3;
  spRec=rec;
  rec.onresult=function(e){
    var best="";
    for(var i=0;i<e.results.length;i++){
      for(var j=0;j<e.results[i].length;j++){
        if(e.results[i][j].transcript.length>best.length){
          best=e.results[i][j].transcript;
        }
      }
    }
    best=best.trim();
    if(best){
      pos[idx].m=pos[idx].m?pos[idx].m+" "+best:best;
    }
    spIdx=-1;spRec=null;renderItem(idx);
  };
  rec.onspeechend=function(){
    try{rec.stop();}catch(e){}
  };
  rec.onerror=function(e){
    if(e.error!=="no-speech"&&e.error!=="aborted"){
      alert("Mikrofon Fehler: "+e.error);
    }
    spIdx=-1;spRec=null;renderItem(idx);
  };
  rec.onend=function(){
    if(spIdx===idx){spIdx=-1;spRec=null;renderItem(idx);}
  };
  try{rec.start();}catch(e){
    alert("Mikrofon konnte nicht gestartet werden: "+e.message);
    spIdx=-1;spRec=null;renderItem(idx);
  }
}
